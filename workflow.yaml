name: CI Workflow

# Workflow ini akan berjalan setiap kali ada push atau pull request ke branch main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 nose

    - name: Lint with flake8
      run: |
        # Berhenti jika ada error sintaksis atau nama yang tidak terdefinisi
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Menghitung semua error lainnya sebagai peringatan (statistics)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run unit tests with nose
      run: |
        # Perintah ini akan menjalankan tes yang ada di repositori
        nosetests
