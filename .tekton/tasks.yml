apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup-and-test
spec:
  steps:
    - name: cleanup
      image: alpine
      script: |
        echo "Cleaning up workspace..."
        rm -rf *

    - name: test
      image: python:3.9-slim
      script: |
        pip install nose
        echo "Running unit tests with nose..."
        nosetests
